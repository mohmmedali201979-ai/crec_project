
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREC 360 | حصري</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #000000;
            --card-bg: #121212;
            --accent-blue: #00adef;
            --accent-red: #ff0000;
            --exclusive-gold: #c5a059;
        }

        body {
            font-family: 'Almarai', sans-serif;
            margin: 0;
            background-color: var(--main-bg);
            color: white;
            overflow-x: hidden;
        }

        /* الهيدر العلوي */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: fixed;
            width: 90%;
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 1000;
        }

        .live-badge {
            background-color: var(--accent-red);
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* واجهة البطل (Hero) */
        .hero {
            position: relative;
            height: 80vh;
            background: linear-gradient(to top, var(--main-bg), transparent),
                        url('https://images.unsplash.com/photo-1450101499163-c8848c66ca85?q=80&w=2070') no-repeat center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 5% 50px;
        }

        .hero h1 { font-size: 2.5rem; margin: 0; font-weight: 800; line-height: 1.2; }
        .hero p { font-size: 1.1rem; color: #ccc; max-width: 500px; margin: 15px 0; }

        .btn-watch {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: fit-content;
        }

        /* الصفوف والمنزلقات */
        .section-row { padding: 20px 5%; }
        .section-title { font-size: 1.3rem; margin-bottom: 15px; font-weight: 700; border-right: 4px solid var(--accent-blue); padding-right: 10px; }

        .slider {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            scrollbar-width: none;
        }
        .slider::-webkit-scrollbar { display: none; }

        .poster-card {
            min-width: 160px;
            height: 240px;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #222;
        }

        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-label {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* شارة "حصري" على الكروت */
        .exclusive-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--exclusive-gold);
            color: black;
            font-size: 0.7rem;
            padding: 2px 8px;
            font-weight: 800;
            border-radius: 3px;
        }

        /* المنيو السفلي المحدث */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: rgba(0,0,0,0.98);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #333;
            z-index: 1001;
        }

        .nav-item { text-align: center; color: #888; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
        .nav-label { font-size: 0.75rem; font-weight: 700; }

    </style>
</head>
<body>

    <header>
        <div class="live-badge">البث المباشر (8)</div>
        <div style="font-weight: 800; font-size: 1.4rem; letter-spacing: -1px;">CREC <span style="color:var(--accent-blue)">360</span></div>
        <div style="font-size: 1.5rem;">☰</div>
    </header>

    <section class="hero">
        <p style="color: var(--accent-blue); margin-bottom: 5px; font-weight: bold; letter-spacing: 1px;">وثائقي حصري</p>
        <h1>تحقيقات مركز البحوث:<br>كشف المستور 2026</h1>
        <p>رحلة في عمق الملفات الجنائية والتدريب الميداني المتقدم.</p>
        <button class="btn-watch">شاهد الآن</button>
    </section>

    <div class="section-row">
        <div class="section-title">تقارير حصرية</div>
        <div class="slider">
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="https://images.unsplash.com/photo-1589829545856-d10d557cf95f?q=80&w=2070">
                <div class="card-label">ملف 404</div>
            </div>
            <div class="poster-card">
                <img src="https://images.unsplash.com/photo-1507925921958-8a62f3d1a50d?q=80&w=2076">
                <div class="card-label">خلف الأسوار</div>
            </div>
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070">
                <div class="card-label">السيبراني</div>
            </div>
        </div>
    </div>

    <div style="height: 100px;"></div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <span style="font-size:1.2rem">🏠</span>
            <div class="nav-label">الرئيسية</div>
        </div>
        <div class="nav-item">
            <span style="font-size:1.2rem">🔍</span>
            <div class="nav-label">البحث</div>
        </div>
        <div class="nav-item" style="color: var(--exclusive-gold);">
            <span style="font-size:1.2rem">💎</span>
            <div class="nav-label">حصري</div>
        </div>
        <div class="nav-item">
            <span style="font-size:1.2rem">👤</span>
            <div class="nav-label">حسابي</div>
        </div>
    </div>

</body>
</html>
