<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREC | المنصة الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #000000;
            --card-bg: #121212;
            --accent-blue: #00adef;
            --accent-red: #ff0000;
            --exclusive-gold: #c5a059;
        }

        body {
            font-family: 'Almarai', sans-serif;
            margin: 0;
            background-color: var(--main-bg);
            color: white;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: fixed;
            width: 90%;
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.6rem; color: white; }
        .logo span { color: var(--accent-blue); }

        .live-badge {
            background-color: var(--accent-red);
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Hero Section */
        .hero {
            position: relative;
            height: 75vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 5% 40px;
        }

        #bg-video {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--main-bg) 15%, transparent 70%);
            z-index: -1;
        }

        .hero h1 { font-size: 2.5rem; margin: 0; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); }
        .btn-watch {
            background-color: var(--accent-blue);
            color: white; border: none;
            padding: 12px 35px; border-radius: 5px;
            font-weight: 800; font-size: 1.1rem;
            cursor: pointer; margin-top: 15px; width: fit-content;
        }

        /* Rows and Sliders */
        .section-row { padding: 25px 5% 0; }
        .section-title { font-size: 1.2rem; margin-bottom: 15px; font-weight: 700; border-right: 4px solid var(--accent-blue); padding-right: 12px; color: #eee; }

        .slider { display: flex; overflow-x: auto; gap: 15px; scrollbar-width: none; padding-bottom: 10px; }
        .slider::-webkit-scrollbar { display: none; }

        .poster-card {
            min-width: 140px;
            height: 210px;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #222;
            flex-shrink: 0;
        }

        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-label { position: absolute; bottom: 8px; right: 8px; font-weight: bold; font-size: 0.85rem; text-shadow: 1px 1px 3px black; }

        .exclusive-badge {
            position: absolute;
            top: 8px; left: 8px;
            background: var(--exclusive-gold);
            color: black; font-size: 0.65rem;
            padding: 2px 6px; font-weight: 800; border-radius: 3px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%;
            background-color: rgba(0,0,0,0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #333;
            z-index: 1001;
        }

        .nav-item { text-align: center; color: #888; font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item span { font-size: 1.3rem; display: block; margin-bottom: 2px; }

    </style>
</head>
<body>

    <header>
        <div class="live-badge">مباشر</div>
        <div class="logo">C<span>REC</span></div>
        <div style="font-size: 1.5rem;">☰</div>
    </header>

    <section class="hero">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="https://player.vimeo.com/external/494245641.sd.mp4?s=19509865e28a6f3b1dc995632f170942502808c4&profile_id=165" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
        <p style="color: var(--accent-blue); font-weight: 800; margin-bottom: 5px;">أحدث الإنتاجات</p>
        <h1>مركز البحوث والتدريب الجنائي</h1>
        <button class="btn-watch">▶ شاهد الآن</button>
    </section>

    <div class="section-row">
        <div class="section-title">أعمال CREC الأصلية</div>
        <div class="slider">
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="redline.jpg" alt="1">
                <div class="card-label">الخط الأحمر</div>
            </div>
            <div class="poster-card">
                <img src="podcast.jpg" alt="2">
                <div class="card-label">البودكاست</div>
            </div>
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="2.png" alt="3">
                <div class="card-label">تحقيقات</div>
            </div>
            <div class="poster-card">
                <img src="hero.jpg" alt="4">
                <div class="card-label">وثائقي خاص</div>
            </div>
        </div>
    </div>

    <div class="section-row">
        <div class="section-title">الأكثر مشاهدة</div>
        <div class="slider">
            <div class="poster-card">
                <img src="2.png" alt="5">
                <div class="card-label">ملف 404</div>
            </div>
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="redline.jpg" alt="6">
                <div class="card-label">مهمة سرية</div>
            </div>
            <div class="poster-card">
                <img src="podcast.jpg" alt="7">
                <div class="card-label">خلف الكواليس</div>
            </div>
            <div class="poster-card">
                <img src="hero.jpg" alt="8">
                <div class="card-label">التدريب الفني</div>
            </div>
        </div>
    </div>

    <div class="section-row">
        <div class="section-title">تقارير ميدانية</div>
        <div class="slider">
            <div class="poster-card">
                <img src="hero.jpg" alt="9">
                <div class="card-label">الميدان</div>
            </div>
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="2.png" alt="10">
                <div class="card-label">الأدلة الجنائية</div>
            </div>
            <div class="poster-card">
                <img src="redline.jpg" alt="11">
                <div class="card-label">التحقيق الرقمي</div>
            </div>
        </div>
    </div>

    <div style="height: 100px;"></div>

    <div class="bottom-nav">
        <div class="nav-item active"><span>🏠</span>الرئيسية</div>
        <div class="nav-item"><span>🔍</span>البحث</div>
        <div class="nav-item" style="color: var(--exclusive-gold);"><span>💎</span>حصري</div>
        <div class="nav-item"><span>👤</span>حسابي</div>
    </div>

</body>
</html>
