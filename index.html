<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREC | العرض الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #000000;
            --card-bg: #121212;
            --accent-blue: #00adef;
            --accent-red: #ff0000;
            --exclusive-gold: #c5a059;
        }

        body {
            font-family: 'Almarai', sans-serif;
            margin: 0;
            background-color: var(--main-bg);
            color: white;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            position: fixed;
            width: 90%;
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
            z-index: 1000;
        }

        .live-badge {
            background-color: var(--accent-red);
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .logo { font-weight: 800; font-size: 1.6rem; color: white; }
        .logo span { color: var(--accent-blue); }

        .hero {
            position: relative;
            height: 85vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 5% 60px;
        }

        /* خلفية الفيديو - تأكد من رفع ملف باسم video.mp4 */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* صورة بديلة في حال لم يعمل الفيديو */
        .hero-fallback {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('hero.jpg') no-repeat center/cover;
            z-index: -3;
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--main-bg) 10%, transparent 70%);
            z-index: -1;
        }

        .hero h1 { font-size: 2.8rem; margin: 0; font-weight: 800; }
        .hero p { font-size: 1.1rem; color: #eee; max-width: 550px; margin: 15px 0; }

        .btn-watch {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px 45px;
            border-radius: 5px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .section-row { padding: 30px 5% 0; }
        .section-title { font-size: 1.3rem; margin-bottom: 20px; font-weight: 700; border-right: 4px solid var(--accent-blue); padding-right: 12px; }

        .slider { display: flex; overflow-x: auto; gap: 15px; scrollbar-width: none; }
        .slider::-webkit-scrollbar { display: none; }

        .poster-card {
            min-width: 170px;
            height: 250px;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #222;
        }

        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-label { position: absolute; bottom: 12px; right: 12px; font-weight: bold; font-size: 0.9rem; }

        .exclusive-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--exclusive-gold);
            color: black;
            font-size: 0.7rem;
            padding: 3px 8px;
            font-weight: 800;
            border-radius: 3px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%;
            background-color: rgba(0,0,0,0.98);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 1001;
        }

        .nav-item { text-align: center; color: #888; font-size: 0.75rem; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item span { font-size: 1.3rem; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="live-badge">مباشر</div>
        <div class="logo">C<span>REC</span></div>
        <div style="font-size: 1.5rem;">☰</div>
    </header>

    <section class="hero">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="video.mp4" type="video/mp4">
        </video>
        <div class="hero-fallback"></div>
        <div class="video-overlay"></div>

        <p style="color: var(--accent-blue); font-weight: 800; margin-bottom: 5px;">إنتاج حصري</p>
        <h1>مركز البحوث والتدريب الجنائي</h1>
        <p>استكشف أحدث الوثائقيات والتقارير الميدانية لعام 2026 بصورة سينمائية احترافية.</p>
        <button class="btn-watch">▶ شاهد الآن</button>
    </section>

    <div class="section-row">
        <div class="section-title">تقارير حصرية</div>
        <div class="slider">
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="redline.jpg" alt="Redline">
                <div class="card-label">الخط الأحمر</div>
            </div>
            <div class="poster-card">
                <img src="podcast.jpg" alt="Podcast">
                <div class="card-label">البودكاست</div>
            </div>
            <div class="poster-card">
                <div class="exclusive-badge">حصري</div>
                <img src="2.png" alt="Special">
                <div class="card-label">تحقيقات خاصة</div>
            </div>
        </div>
    </div>

    <div style="height: 100px;"></div>

    <div class="bottom-nav">
        <div class="nav-item active"><span>🏠</span>الرئيسية</div>
        <div class="nav-item"><span>🔍</span>البحث</div>
        <div class="nav-item" style="color: var(--exclusive-gold);"><span>💎</span>حصري</div>
        <div class="nav-item"><span>👤</span>حسابي</div>
    </div>

</body>
</html>
