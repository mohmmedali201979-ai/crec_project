<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز البحوث الجنائية والتدريب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000; --nav-bg: rgba(15, 15, 15, 0.9); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; padding-bottom: 90px; }

        /* الهيدر العلوي */
        header { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(to bottom, rgba(0,0,0,1) 20%, transparent); 
            position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box;
        }
        .logo-area { font-weight: 700; color: var(--gold); font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .logo-area i { font-size: 20px; }

        /* منطقة فيديو الخلفية */
        .hero-container {
            position: relative; width: 100%; height: 70vh; overflow: hidden;
            display: flex; align-items: flex-end; padding: 0 5% 50px; box-sizing: border-box;
        }
        #bgVideo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; filter: brightness(0.7);
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg) 15%, transparent 60%);
            z-index: 0;
        }
        .hero-content { z-index: 2; width: 100%; }
        .hero-content h1 { font-size: 26px; margin: 0; font-weight: 700; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        
        .play-btn-main { 
            margin-top: 15px; background: var(--gold); color: black; border: none; 
            padding: 10px 30px; border-radius: 5px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 8px; font-size: 16px;
        }

        /* تنسيق الصفوف */
        .row-section { padding: 25px 5% 0; }
        .row-header { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .row-header span { color: var(--gold); font-size: 12px; font-weight: normal; }

        .scroller { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }

        .item-card { min-width: 140px; cursor: pointer; }
        .item-img { width: 100%; aspect-ratio: 2/3; border-radius: 8px; background-size: cover; background-position: center; border: 1px solid #222; position: relative; }
        .item-title { font-size: 12px; margin-top: 8px; color: #eee; text-align: center; }

        /* شريط سفلي (الجزيرة 360) */
        .bottom-nav { 
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; height: 65px; background: var(--nav-bg); backdrop-filter: blur(20px);
            border-radius: 20px; display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .nav-tab { color: #888; text-decoration: none; text-align: center; font-size: 10px; flex: 1; }
        .nav-tab.active { color: var(--gold); }
        .nav-tab i { display: block; font-size: 18px; margin-bottom: 4px; }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <i class="fas fa-scale-balanced"></i>
            <span>مركز البحوث الجنائية</span>
        </div>
        <i class="fas fa-search" style="font-size: 18px;"></i>
    </header>

    <div class="hero-container">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="promo.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>جناح النيابة العامة بليبيا</h1>
            <button class="play-btn-main">
                <i class="fas fa-play"></i> شاهد الآن
            </button>
        </div>
    </div>

    <div class="row-section">
        <div class="row-header">البودكاست القضائي <span>عرض الكل</span></div>
        <div class="scroller">
            <div class="item-card">
                <div class="item-img" style="background-image: url('podcast.jpg');"></div>
                <div class="item-title">الحلقة الأولى</div>
            </div>
            <div class="item-card">
                <div class="item-img" style="background-image: url('redline.jpg');"></div>
                <div class="item-title">سلسلة خط أحمر</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-tab active"><i class="fas fa-home"></i>الرئيسية</a>
        <a href="#" class="nav-tab"><i class="fas fa-microphone"></i>بودكاست</a>
        <a href="#" class="nav-tab"><i class="fas fa-newspaper"></i>الأخبار</a>
        <a href="#" class="nav-tab"><i class="fas fa-user-shield"></i>المركز</a>
    </nav>

</body>
</html>
